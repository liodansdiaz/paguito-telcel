services:
  # Backend API
  - type: web
    name: paguito-telcel-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 3000
      - key: REDIS_ENABLED
        value: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: NOTIFICATIONS_EMAIL
        value: false
      - key: NOTIFICATIONS_WHATSAPP
        value: false
      - key: NOTIFICATIONS_INTERNAL
        value: true
      - key: GROQ_API_KEY
        sync: false
