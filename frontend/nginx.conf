# ============================================
# Configuración de Nginx para el Frontend
# ============================================
# Nginx se encarga de:
# 1. Servir los archivos estáticos del frontend
# 2. Redirigir TODAS las rutas a index.html (SPA)
# 3. Reenviar las llamadas /api al backend
# ============================================

server {
    # Escuchar en el puerto 80 (HTTP estándar)
    listen 80;
    
    # Nombre del servidor (por ahora localhost, después tu dominio)
    server_name localhost;

    # Directorio donde están los archivos del frontend compilado
    root /usr/share/nginx/html;
    
    # Archivo por defecto cuando alguien visita la raíz
    index index.html;

    # Configuración de caché para archivos estáticos
    # Los archivos con hash en el nombre se cachean por 1 año
    # (Vite genera archivos como: index-a1b2c3d4.js)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reenviar TODAS las llamadas /api al backend
    # El backend corre en el contenedor "backend" en el puerto 3000
    # Docker Compose resuelve el nombre "backend" automáticamente
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        
        # Headers necesarios para que el backend sepa quién hace la request
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Soporte para Server-Sent Events (SSE) que usa el chat con IA
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;  # 24 horas para SSE
    }

    # Reenviar las llamadas de uploads al backend
    # (las imágenes de productos se sirven desde el backend)
    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SOLO el /health del backend (útil para monitoreo)
    location = /health {
        proxy_pass http://backend:3000;
    }

    # CONFIGURACIÓN CRÍTICA PARA SPA (Single Page Application)
    # Cuando alguien visita /catalogo, /admin/dashboard, etc.,
    # Nginx NO encuentra ese archivo en disco (porque es una ruta
    # de React Router, no un archivo real).
    # 
    # Esta regla le dice a Nginx: "si no encontrás el archivo,
    # serví index.html y dejá que React Router se encargue".
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Desactivar el log de favicon (para no llenar los logs con 404)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
