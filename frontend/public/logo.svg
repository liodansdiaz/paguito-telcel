<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Logo Amigo Paguitos Telcel - Fondo transparente -->
  
  <!-- Fondo decorativo con círculo -->
  <circle cx="100" cy="100" r="90" fill="#002f87"/>
  <circle cx="100" cy="100" r="75" fill="#13ec6d"/>
  
  <!-- Teléfono estilizado -->
  <g>
    <!-- Cuerpo del teléfono (azul oscuro sobre verde) -->
    <rect x="60" y="55" width="80" height="90" rx="12" fill="#002f87"/>
    
    <!-- Pantalla (blanco/claro) -->
    <rect x="65" y="60" width="70" height="70" rx="6" fill="#ffffff"/>
    
    <!-- Botón central -->
    <circle cx="100" cy="135" r="6" fill="#002f87"/>
    
    <!-- Cámara frontal -->
    <circle cx="100" cy="57" r="2" fill="#002f87"/>
  </g>
</svg>
