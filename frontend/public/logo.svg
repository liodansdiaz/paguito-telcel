<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Círculo de fondo azul -->
  <circle cx="100" cy="100" r="95" fill="#002f87"/>
  
  <!-- Círculo de acento verde -->
  <circle cx="100" cy="100" r="80" fill="#13ec6d"/>
  
  <!-- Teléfono estilizado -->
  <g fill="#002f87">
    <!-- Cuerpo del teléfono -->
    <rect x="70" y="55" width="60" height="90" rx="8" fill="#002f87"/>
    <!-- Pantalla -->
    <rect x="76" y="62" width="48" height="68" rx="3" fill="#001f5c"/>
    <!-- Botón -->
    <circle cx="100" cy="140" r="6" fill="#002f87"/>
    <!-- Cámara frontal -->
    <circle cx="100" cy="66" r="3" fill="#002f87"/>
  </g>
</svg>